.qa-input-wrap{display:flex;gap:6px;margin-bottom:12px}

/* Spreadsheet viewer */

.ss-tab.active{background:#222;color:#fff;border-color:#222}

.ss-table{border-collapse:collapse;font-size:11px;width:100%}

.ss-table th{background:#f0f0f0;font-weight:700;position:sticky;top:0;z-index:1}

.full-width{grid-column:1/-1}

let openSections = {};

function toggle(id) {
  openSections[id] = !openSections[id];
  render();
}

function isOpen(id) {
  return !!openSections[id];
}

// ============================================================
// RENDER HELPERS
// ============================================================
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

function renderSection(id, title, contentHtml, defaultOpen) {
  if (defaultOpen && openSections[id] === undefined) openSections[id] = true;
  const open = isOpen(id);
  return `<div class="section">
    <div class="box box-title" onclick="toggle('${id}')">
      <span>${esc(title)}</span>
      <span style="font-size:12px">${open ? "▲" : "▼"}</span>
    </div>
    <div class="box-content" style="display:${open?'block':'none'}">${contentHtml}</div>
  </div>`;
}

function renderGrade(key, data) {
  let duties = data.duties.map(d => `<div style="padding:2px 0;border-bottom:1px solid #eee">・${esc(d)}</div>`).join("");
  return `<div class="grade-box">
    <h4>${esc(key)}</h4>
    <div><span class="label">責務:</span> ${esc(data.responsibility)}</div>
    <div><span class="label">昇格条件:</span> ${esc(data.promotion)}</div>
    <div style="margin-top:6px"><span class="label">職務内容:</span></div>
    ${duties}
  </div>`;
}

function renderCurriculum(steps) {
  return steps.map(s => `<div class="curriculum-step">${esc(s)}</div>`).join("");
}

// ============================================================
let qaAnswer = "";
let qaHistory = [];

function askQA() {
  const input = document.getElementById("qa-input");
  const q = input.value.trim();
  if (!q) return;
  
  // Search in QA_DATA
  let bestMatch = null;
  let bestScore = 0;
  
  for (const [question, answer] of Object.entries(QA_DATA)) {
    let score = 0;
    const qLower = q.toLowerCase();
    const keyLower = question.toLowerCase();
    
    // Exact keyword matching
    const keywords = qLower.split(/[\s、。？?]+/).filter(w => w.length > 1);
    keywords.forEach(kw => {
      if (keyLower.includes(kw)) score += 3;
      if (answer.toLowerCase().includes(kw)) score += 1;
    });
    
    if (score > bestScore) {
      bestScore = score;
      bestMatch = { question, answer };
    }
  }
  
  if (bestMatch && bestScore >= 2) {
    qaAnswer = `<strong>Q: ${esc(bestMatch.question)}</strong><br><br>${esc(bestMatch.answer)}`;
  } else {
    qaAnswer = `申し訳ありません。「${esc(q)}」に対する回答がデータベースにありません。管理者にお問い合わせください。`;
  }
  
  input.value = "";
  render();
}

function showQA(question) {
  qaAnswer = `<strong>Q: ${esc(question)}</strong><br><br>${esc(QA_DATA[question])}`;
  render();
}

  try {
    localStorage.setItem("caberito_photos", JSON.stringify(ssPhotoStore));
    alert("保存しました");
  } catch(e) {
    alert("保存に失敗しました");
  }
}

function ssHandlePhoto(key, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > 400) { h = h * 400 / w; w = 400; }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      ssPhotoStore[key] = canvas.toDataURL("image/jpeg", 0.6);
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

const SS_SHEET_NAMES = Object.keys(SS_SHEETS);

function renderSpreadsheet() {
  if (!ssUnlocked) {
    return `<div class="ss-login">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">人事評価制度シート（Excel閲覧）</div>
      <div style="font-size:11px;color:#666;margin-bottom:16px">パスワードを入力してスプレッドシートを開く</div>
      <div>
        <input type="password" id="ss-pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')ssLogin()">
        <button onclick="ssLogin()">開く</button>
      </div>
      <div class="ss-error" id="ss-error">パスワードが正しくありません</div>
    </div>`;
  }
  
  const sheetName = SS_SHEET_NAMES[ssCurrentSheet];
  const rows = SS_SHEETS[sheetName];
  const isPhotoSheet = sheetName.includes("写真");
  
  let tabs = SS_SHEET_NAMES.map((n, i) => 
    `<div class="ss-tab${i===ssCurrentSheet?' active':''}" onclick="ssSelectSheet(${i})">${esc(n)}</div>`
  ).join("");
  
  let tableRows = "";
  rows.forEach((row, ri) => {
    let cells = row.map((cell, ci) => {
      if (isPhotoSheet && ri > 0 && ci > 0) {
        const photoKey = `${sheetName}_${ri}_${ci}`;
        const hasPhoto = ssPhotoStore[photoKey];
        return `<td><div class="photo-cell">
          ${hasPhoto ? `<img src="${ssPhotoStore[photoKey]}">` : '<span class="ph-label">クリックして写真貼付</span>'}
          <input type="file" accept="image/*" onchange="ssHandlePhoto('${photoKey}', this)">
        </div></td>`;
      }
      const tag = ri === 0 ? "th" : "td";
      return `<${tag}>${esc(cell)}</${tag}>`;
    }).join("");
    tableRows += `<tr>${cells}</tr>`;
  });
  
  return `<div class="ss-tabs">${tabs}</div>
    <div class="ss-table-wrap">
      <table class="ss-table"><tbody>${tableRows}</tbody></table>
    </div>
    <div class="save-bar">
      <span style="font-size:12px">写真の保存・書き出し</span>
      <div>
        <button onclick="ssSave()">保存する</button>
      </div>
    </div>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  
  // Left column: evaluation + salary
  let gradesHtml = Object.entries(GRADES).map(([k,v]) => renderGrade(k,v)).join("");
  
  let salaryRegHtml = `<table class="salary-table">
    <tr><th>等級</th><th>基本給</th></tr>
    ${SALARY_REGULAR.rows.map(r => `<tr><td>${esc(r.grade)}</td><td>${esc(r.base)}</td></tr>`).join("")}
  </table><div style="font-size:10px;color:#666;margin-top:4px">${esc(SALARY_REGULAR.note)}</div>`;
  
  let salaryPartHtml = `<table class="salary-table">
    <tr>${SALARY_PART.headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr>
    ${SALARY_PART.rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("")}
  </table><div style="font-size:10px;color:#666;margin-top:4px">${esc(SALARY_PART.note)}</div>`;
  
  let pitchHtml = `<table class="salary-table">
    <tr><th>評価点</th><th>ピッチ</th></tr>
    ${PITCH_TABLE.rows.map(r => `<tr><td>${esc(r.range)}</td><td>${esc(r.pitch)}</td></tr>`).join("")}
  </table><div style="font-size:10px;color:#666;margin-top:4px">${esc(PITCH_TABLE.note)}</div>`;
  
  // Curricula
  let currHtml = Object.entries(CURRICULA).map(([k,v]) => 
    renderSection("curr_"+k, v.title, renderCurriculum(v.steps))
  ).join("");
  
  // Q&A
  let qaListHtml = Object.keys(QA_DATA).map(q => 
    `<div class="qa-q" onclick="showQA('${q.replace(/'/g,"\\'")}')"><span>${esc(q)}</span><span>→</span></div>`
  ).join("");
  
  let qaHtml = `<div class="qa-section">
    <div class="qa-input-wrap">
      <input class="qa-input" id="qa-input" placeholder="質問を入力してください..." onkeydown="if(event.key==='Enter')askQA()">
      <button class="qa-btn" onclick="askQA()">質問</button>
    </div>
    ${qaAnswer ? `<div class="qa-answer">${qaAnswer}</div>` : ""}
    <div style="margin-top:12px;font-size:11px;color:#666">よくある質問:</div>
    ${qaListHtml}
  </div>`;
  
  // Spreadsheet
  let ssHtml = renderSpreadsheet();
  
  // Assembly
  app.innerHTML = `
    <div class="grid">
      <div>
        ${renderSection("eval", "評価制度・役割定義", gradesHtml, false)}
        ${renderSection("salary_reg", "正社員 給与テーブル", salaryRegHtml, false)}
        ${renderSection("salary_part", "パート 時給テーブル", salaryPartHtml, false)}
        ${renderSection("pitch", "変動ピッチ表", pitchHtml, false)}
      </div>
      <div>
        ${currHtml}
        ${renderSection("qa", "Q&A（会社ルール）", qaHtml, false)}
      </div>
    </div>
    <div class="full-width" style="margin-top:12px">
      ${renderSection("spreadsheet", "人事評価制度シート（Excel閲覧）", ssHtml, false)}
    </div>
  `;
}

// Initial render
render();
